      terms_any: ["teleportation"]

  - id: negative_lasersteuer
    query: "Lasersteuer fuer Mondkolonien und Orbitalkitas"
    query_type: negative
    should_find: false
    expected:
      terms_any: ["lasersteuer", "orbitalkitas"]
