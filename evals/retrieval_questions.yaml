    expected:
      kuerzel_any: ["B08"]
      landesverband: baden_wuerttemberg
      year: 2024
      terms_any: ["ganztagsschule"]

  - id: negative_quantensteuer
    query: "Quantensteuer fuer Mondkolonien"
    query_type: negative
    should_find: false
    expected:
      terms_any: ["quantensteuer", "mondkolonien"]

  - id: negative_marsbahn
    query: "Marsbahn Tempelhofer Feld 2099"
    query_type: negative
    should_find: false
