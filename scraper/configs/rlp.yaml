status_map:
  "annahme": "Annahme"
  "geändert angenommen": "Annahme mit Änderungen"
  "ablehnung": "Ablehnung"
  "überweisung": "Überweisung"
  "erledigt": "Erledigt"
  "zurückgezogen": "Zurückgezogen"

scrape_delay: 1.0
checkpoint_interval: 50

audit:
